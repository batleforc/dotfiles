<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Re-add system font directories in case a privacy browser strips them -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>
  <dir prefix="xdg">fonts</dir>

  <!-- Force-accept Noto Color Emoji even if a rejectfont rule was set -->
  <selectfont>
    <acceptfont>
      <pattern>
        <patelt name="family">
          <string>Noto Color Emoji</string>
        </patelt>
      </pattern>
    </acceptfont>
  </selectfont>
</fontconfig>
